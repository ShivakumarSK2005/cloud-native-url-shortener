apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
      - name: auth-service

        image: auth-service:latest

        imagePullPolicy: Never

        ports:
        - containerPort: 3001

        env:
        - name: PORT
          value: "3001"

        - name: DB_HOST
          value: "postgres"

        - name: DB_PORT
          value: "5432"

        - name: DB_USER
          value: "postgres"

        - name: DB_PASSWORD
          value: "postgres"

        - name: DB_NAME
          value: "auth_db"

        - name: JWT_SECRET
          value: "my_super_secret_jwt_key_12345"
