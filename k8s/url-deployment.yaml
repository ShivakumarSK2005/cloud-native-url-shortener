apiVersion: apps/v1
kind: Deployment

metadata:
  name: url-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: url-service

  template:
    metadata:
      labels:
        app: url-service

    spec:
      containers:
      - name: url-service

        image: url-service:latest

        imagePullPolicy: Never

        ports:
        - containerPort: 3002

        env:
        - name: PORT
          value: "3002"

        - name: DB_HOST
          value: "postgres"

        - name: DB_PORT
          value: "5432"

        - name: DB_USER
          value: "postgres"

        - name: DB_PASSWORD
          value: "postgres"

        - name: DB_NAME
          value: "url_db"

        - name: JWT_SECRET
          value: "my_super_secret_jwt_key_12345"

        - name: REDIS_URL
          value: "redis://redis:6379"
